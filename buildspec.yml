version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies for React client..."
      - cd client
      - npm install
  pre_build:
    commands:
      - echo "Checking build configuration..."
      - echo "VITE_API_URL is configured as $VITE_API_URL"
  build:
    commands:
      - echo "Building React client..."
      - npm run build
artifacts:
  base-directory: client/dist
  files:
    - '**/*'
cache:
  paths:
    - 'client/node_modules/**/*'
